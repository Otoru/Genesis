# SonarQube analysis for Genesis
# See: https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/scanners/sonarscanner/

sonar.projectKey=genesis
sonar.projectName=Genesis

sonar.sources=genesis
sonar.tests=tests
sonar.python.version=3.10,3.11,3.12
sonar.python.coverage.reportPaths=coverage.xml

# Exclude virtual env and common noise
sonar.exclusions=**/.venv/**,**/venv/**,**/__pycache__/**,**/.tox/**,**/.mypy_cache/**

# Rules documented as accepted (close as Won't fix / False positive in Sonar UI):
# - python:S7483: timeout param is forwarded to wait_for()/FreeSWITCH, not a generic context manager
# - python:S7504: list() is required when iterating over set that may change (snapshot)
# - python:S2068: "ClueCon" is FreeSWITCH default dev password; override via ESL_PASSWORD in prod
# - python:S7503: some async methods are interface-only (e.g. Protocol.start, LoadBalancerBackend)
# - python:S3516: Filter.filter() returns True by design (logging Filter contract)
sonar.issue.ignore.allfile=python:S7483,python:S7504,python:S2068,python:S7503,python:S3516
